services:
  image-studio-api:
    build: .
    container_name: image-studio-api
    ports:
      - "8000:8000"
    environment:
      APP_DATA_DIR: /app/data
      HF_HOME: /app/data/hf-cache
      HF_HUB_CACHE: /app/data/hf-cache/hub
      DEFAULT_MODEL_ID: runwayml/stable-diffusion-v1-5
      APP_VERSION: 1.0.0
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]